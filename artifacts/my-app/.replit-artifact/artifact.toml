kind = "web"
previewPath = "/"
title = "My App"
version = "1.0.0"
id = "artifacts/my-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19621

[services.development]
run = "pnpm --filter @workspace/my-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/my-app", "run", "build" ]
publicDir = "artifacts/my-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19621"
BASE_PATH = "/"
